<!DOCTYPE html>
<html>
    <head>
        <script>
            function onClickSquare(){
                var num=document.getElementById("txtNum").value;
                alert(num*num);
            }
        </script>
    </head>
    <body>
        <h1>Square value</h1>
        <label id="lblNumber">Number</label>
        <input id="txtNum" type="number">
        <button id="btnSquare" onClick="onClickSquare()">Square</button>
    </body>
</html>
