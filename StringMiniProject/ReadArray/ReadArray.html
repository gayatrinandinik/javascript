<!DOCTYPE html>
<html>
    <head>
        <title>Read array</title>
        <script src="ReadArray.js"></script>
        <link rel="stylesheet" href="ReadArray.css">
    </head>
    <body>
        <h1 style="text-align: center; background-color: hotpink;">Read Array</h1>
        <div class="display">
        <label id="lblColour">Colours</label>
        <input id="txtColour" type="text">
        <br>
        <button id="btnPush" class="one" onClick="onClickPush()">Push</button>
        <p id="pResult"></p>
        </div>
        
        <label id="lblIndex">Index</label>
        <input id="txtIndex" type="text">
        <button id="btnRead" onClick="onClickRead()">Read</button>
        <p id="pIndexResult"></p>
    </body>
</html>
